version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.13"
  jobs:
    post_install:
      - ls $READTHEDOCS_REPOSITORY_PATH
      - export PYTHONPATH=$READTHEDOCS_REPOSITORY_PATH/MINQ/py/minq5

sphinx:
    configuration: docs/conf.py
    fail_on_warning: true

# TODO: Enable this once pdflatex is capable of correctly rendering the PDF
# file.
#formats:
#  - pdf

python:
    install:
      - requirements: docs/requirements.txt
      - method: pip
        path: ibcdfo_pypkg

