# ----- IBCDFO FULL TESTING OF LOCAL CLONE WITHOUT COVERAGE
name: Test IBCDFO MATLAB Code
env:
  MINQ_COMMIT_FILE: ${{ github.workspace }}/REQUIRED_MINQ_COMMIT
  MINQ5_M_PATH:     ${{ github.workspace }}/MINQ/m/minq5
  MINQ8_M_PATH:     ${{ github.workspace }}/MINQ/m/minq8
  BENDFO_M_PATH:    ${{ github.workspace }}/BenDFO/m
  BENDFO_DATA_PATH: ${{ github.workspace }}/BenDFO/data
  POUNDERS_M_PATH:  ${{ github.workspace }}/IBCDFO/pounders/m
  MSAMP_M_PATH:     ${{ github.workspace }}/IBCDFO/manifold_sampling/m
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----- LOAD OFFICIAL MINQ COMMIT INFO FOR PROPER SETUP FOR IBCDFO
  # Load this eagerly so that it is available for immediate use in all
  # subsequent jobs.
  load_minq_sha:
    outputs:
        minq_sha: ${{ steps.load_sha.outputs.minq_sha }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout IBCDFO repository
      uses: actions/checkout@v6
    - name: Load Official MINQ SHA
      id: load_sha
      run: |
        MINQ_SHA=$(cat $MINQ_COMMIT_FILE)
        echo "The valid MINQ commit hash is $MINQ_SHA"
        echo "minq_sha=$MINQ_SHA" >> "$GITHUB_OUTPUT"

  # Rather than runs tests on a full matrix of test suites, we accept running
  # only on the oldest and latest versions available.
  test_ibcdfo:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15, macos-26, macos-26-intel]
        matlab-release: ["R2021a", "latest"]
        exclude:
          # Failing with a possible issue outside IBCDFO (Issue #157)
          - os: macos-14
            matlab-release: "R2023b"
    runs-on: ${{ matrix.os }}
    needs: load_minq_sha
    env:
      MINQ_SHA: ${{ needs.load_minq_sha.outputs.minq_sha }}
    steps:
    # -- General Setup Steps
    - name: Checkout IBCDFO repository
      uses: actions/checkout@v6
      with:
        path: IBCDFO
    - name: Checkout MINQ repository
      uses: actions/checkout@v6
      with:
        repository: POptUS/MINQ
        path: MINQ
        ref: ${{ env.MINQ_SHA }}
    - name: Checkout BenDFO repository
      uses: actions/checkout@v6
      with:
        repository: POptUS/BenDFO
        path: BenDFO
    - name: Set up MATLAB ${{ matrix.matlab-release }}
      uses: matlab-actions/setup-matlab@v2
      with:
        release: ${{ matrix.matlab-release }}
        products: Optimization_Toolbox

    # -- Test Execution Step
    - name: Test POUNDERS
      uses: matlab-actions/run-command@v2
      with:
        command: >
            addpath("${{ env.MINQ5_M_PATH }}"),
            addpath("${{ env.MINQ8_M_PATH }}"),
            addpath("${{ env.BENDFO_M_PATH }}"),
            addpath("${{ env.BENDFO_DATA_PATH }}"),
            cd ${{ env.POUNDERS_M_PATH }},
            results = runtests("IncludeSubfolders", true),
            assertSuccess(results);

    - name: Test Manifold Sampling
      uses: matlab-actions/run-command@v2
      with:
        command: >
            addpath("${{ env.BENDFO_M_PATH }}"),
            addpath("${{ env.BENDFO_DATA_PATH }}"),
            cd ${{ env.MSAMP_M_PATH }},
            results = runtests("IncludeSubfolders", true),
            assertSuccess(results),
